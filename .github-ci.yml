stages:
  - build
  - deploy

variables:
  ZIP_NAME: "app_package.zip"
  PROJECT_FILE: "MP1Project.csproj"
  PUBLISH_DIR: "publish_output"

build_app:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - apt-get update -y
    - apt-get install -y zip
    - dotnet restore
    - dotnet publish "$PROJECT_FILE" -c Release -o "$PUBLISH_DIR"
    - cd "$PUBLISH_DIR"
    - zip -r "../$ZIP_NAME" .
  artifacts:
    paths:
      - $ZIP_NAME
    expire_in: 1 hour
  only:
    - branches

deploy_app:
  stage: deploy
  image: mcr.microsoft.com/azure-cli:latest
  dependencies:
    - build_app
  script:
    - az login --service-principal -u "$APP_ID" -p "$PASSWORD" --tenant "$TENANT"
    - az account set --subscription "$SUBSCRIPTION_ID"
    - az webapp deploy --resource-group "$AZURE_RESOURCE_GROUP" --name "$AZURE_WEBAPP_NAME" --src-path "$ZIP_NAME" --type zip
  only:
    - branches